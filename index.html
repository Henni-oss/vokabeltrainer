<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dein Pinoy Vokabeltrainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="trainer-container">
        
        <div class="header-nav-wrapper">
            <div class="logo-header-row unified-header">
                <img src="logo.png" alt="Pinoy Café Logo" class="cafe-logo-small" id="header-logo">
                <h1 id="main-heading">Dein Pinoy Vokabeltrainer</h1>
            </div>

            <button id="menu-toggle" class="hamburger-menu" aria-label="Menü öffnen">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div id="side-nav" class="nav-overlay">
            <button id="nav-close" class="close-btn">&times;</button>
            <div class="nav-links">
                <a href="#" id="nav-home">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    <span>Home</span>
                </a>
                
                <div class="nav-category-wrapper">
                    <div class="nav-static-item">
                        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                        <span>Kategorie wechseln:</span>
                    </div>
                    <div class="select-wrapper white-select" id="nav-select-wrapper">
                        <select id="nav-kategorie-select">
                            <option value="alle">Alle Wörter</option>
                            <option value="Farben">Farben</option>
                            <option value="Tiere">Tiere</option>
                            <option value="Essen">Essen & Gerichte</option>
                            <option value="Begrüßungen">Begrüßungen</option>
                            <option value="Zahlen">Zahlen</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="start-screen" class="screen-content">
            <div class="welcome-box">
                <div class="speech-bubble welcome-bubble bubble-top">
                    <p><strong>Mabuhay! Ich bin Kami! 🥭</strong></p>
                    <p>Lass uns gemeinsam auf die Reise gehen und eine neue Sprache lernen. Bist du bereit?</p>
                </div>
                <img src="kami_mango.png" alt="Kami die Mango" class="kami-welcome-img">
            </div>

            <div class="section category-start-section">
                <label for="kategorie-select">Kategorie wählen</label>
                <div class="select-wrapper" id="select-wrapper">
                    <select id="kategorie-select">
                        <option value="alle">Alle Wörter</option>
                        <option value="Farben">Farben</option>
                        <option value="Tiere">Tiere</option>
                        <option value="Essen">Essen & Gerichte</option>
                        <option value="Begrüßungen">Begrüßungen</option>
                        <option value="Zahlen">Zahlen</option>
                    </select>
                </div>
            </div>

            <button id="start-btn" class="primary-btn">
    <span>Reise starten!</span>
    <svg class="white-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 18px; height: 18px; margin-left: 8px; vertical-align: middle;">
        <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>
        </div>

        <div id="game-screen" class="screen-content hidden">
            <div class="fortschritt-block">
                <div class="fortschritt-info">
                    Vokabel: <strong id="aktuelle-frage">1</strong> von <strong id="gesamte-fragen">10</strong>
                </div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
                
                <div id="streak-container" class="streak-center-container">
                    <div class="streak-badge">
                        <span id="streak-text">0x Streak 🔥</span>
                    </div>
                </div>
            </div>

            <div class="kami-frage-container">
                <img src="kami_mango.png" alt="Kami" class="kami-avatar">
                <div class="speech-bubble">
                    <p class="bubble-caption">Was bedeutet das Wort?</p>
                    <h2 id="gesuchtes-wort">---</h2>
                </div>
            </div>

            <div class="antwort-box">
                <button class="antwort-btn">---</button>
                <button class="antwort-btn">---</button>
                <button class="antwort-btn">---</button>
                <button class="antwort-btn">---</button>
            </div>

            <div id="feedback" class="feedback-box"></div>

            <button id="weiter-btn" class="primary-btn">
                <span id="weiter-btn-text">Nächste Frage</span>
                <svg class="white-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div id="result-screen" class="screen-content hidden">
            <div class="welcome-box">
                <div class="speech-bubble welcome-bubble bubble-top">
                    <div id="result-speech-content"></div>
                </div>
                <img id="result-kami-img" src="kami_zufrieden.png" alt="Kami Ergebnis" class="kami-welcome-img">
            </div>

            <button id="show-details-btn" class="primary-btn" style="margin-top: 15px;">
                <span>Meine Ergebnisse erfahren</span>
                <svg class="white-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
           <button id="restart-btn" class="primary-btn hidden" style="margin-top: 15px;">
    <span>Zurück zum Start</span>
    <svg class="white-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
