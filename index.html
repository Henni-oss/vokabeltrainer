<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabeltrainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="trainer-container">
        
        <div class="header-nav-wrapper">
            <div class="logo-header-row">
                <img src="logo.png" id="header-logo" class="cafe-logo-small" alt="Logo">
                <h1 id="main-heading">DEIN PINOY VOKABELTRAINER</h1>
            </div>

            <button id="menu-toggle" class="hamburger-menu" aria-label="Menü öffnen">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <div id="nav-overlay" class="nav-overlay">
            <button id="close-btn" class="close-btn">&times;</button>
            <div class="nav-links">
                <a href="#" id="link-home">
                    <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span>Startseite</span>
                </a>
                
                <div class="nav-category-wrapper">
                    <div class="nav-static-item">
                        <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2z" />
                        </svg>
                        <span>Kategorie wechseln</span>
                    </div>
                    <div class="select-wrapper white-select" id="menu-category-dropdown-wrapper">
                        <select id="menu-category-select">
                            </select>
                    </div>
                </div>
            </div>
        </div>

        <div id="start-screen" class="screen-content">
            
            <div class="speech-bubble">
                <p style="margin: 0 0 8px 0; font-weight: 700; font-size: 18px;">Mabuhay! Ich bin Kami! 🥭</p>
                <p style="margin: 0; font-weight: 400; font-size: 14px; line-height: 1.4;">Lass uns gemeinsam auf die Reise gehen und eine neue Sprache lernen. Bist du bereit?</p>
            </div>

            <div class="welcome-box" style="margin-top: 10px;">
                <img src="kami_mango.png" class="kami-welcome-img" alt="Kami">
            </div>

            <div class="category-start-section">
                <label for="main-category-select">Kategorie wählen</label>
                <div class="select-wrapper" id="main-category-dropdown-wrapper">
                    <select id="main-category-select">
                        </select>
                </div>
            </div>

            <button id="start-btn" class="primary-btn">
                <span>Reise starten! 🚀</span>
            </button>
        </div>

        <div id="game-screen" class="screen-content hidden">
            <div class="kami-frage-container">
                <img src="kami_mango.png" class="kami-avatar" alt="Kami">
                <div class="speech-bubble">
                    <p class="bubble-caption">Was bedeutet das Wort?</p>
                    <p id="gesuchtes-wort">Wort</p>
                </div>
            </div>

            <div class="antwort-box" id="antwort-container">
                <button class="antwort-btn">Antwort 1</button>
                <button class="antwort-btn">Antwort 2</button>
                <button class="antwort-btn">Antwort 3</button>
                <button class="antwort-btn">Antwort 4</button>
            </div>

            <div id="feedback" class="feedback-box"></div>

            <div class="fortschritt-block">
                <div class="fortschritt-info" id="progress-text">Vokabel: 0 von 0</div>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>

            <div id="streak-container" class="streak-center-container">
                <span class="streak-badge" id="streak-text">🔥 0er Serie!</span>
            </div>

            <button id="next-btn" class="primary-btn hidden" style="margin-top: 15px;">
                <span>Nächste Frage ➔</span>
            </button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
