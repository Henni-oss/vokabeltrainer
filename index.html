<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dein Pinoy Vokabeltrainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- STARTSEITE (Duolingo Style) -->
    <div id="start-screen" class="trainer-container">
        <div class="logo-area">
            <!-- Dein rundes Tagalog Vocabeltrainer Logo -->
            <img src="ChatGPT Image 22. Juni 2026, 11_59_39.png" alt="Pinoy Café Logo" class="cafe-logo">
            <h1>Dein Pinoy Vokabeltrainer</h1>
        </div>
        
        <div class="welcome-box">
            <!-- Deine winkende Mango Grafik -->
            <img src="Kami_winkend_orange.png" alt="Kami die Mango" class="kami-welcome-img">
            <div class="speech-bubble welcome-bubble">
                <p><strong>Mabuhay! Ich bin Kami! 🥭</strong></p>
                <p>Lass uns gemeinsam auf die Reise gehen und eine neue Sprache lernen. Bist du bereit?</p>
            </div>
        </div>

        <button id="start-btn" class="primary-btn">Reise starten! 🚀</button>
    </div>

    <!-- HAUPT-TRAINER AREA -->
    <div id="game-screen" class="trainer-container hidden">
        <div class="logo-area-game">
            <!-- Dein rundes Logo verkleinert für den Spielbildschirm -->
            <img src="ChatGPT Image 22. Juni 2026, 11_59_39.png" alt="Pinoy Café Logo" class="cafe-logo-small">
            <h1>Dein Pinoy Vokabeltrainer</h1>
        </div>

        <!-- Themenauswahl -->
        <div class="section">
            <label for="kategorie-select">Wähle eine Kategorie:</label>
            <select id="kategorie-select">
                <option value="alle">☕ Alle Wörter</option>
                <option value="Farben">🎨 Farben</option>
                <option value="Tiere">🐾 Tiere</option>
                <option value="Essen">🍲 Essen & Gerichte</option>
                <option value="Begrüßungen">👋 Begrüßungen</option>
                <option value="Zahlen">🔢 Zahlen</option>
            </select>
        </div>

        <!-- Fortschritt -->
        <div class="fortschritt">
            <span>Vokabel: <strong id="aktuelle-frage">1</strong> von <strong id="gesamte-fragen">10</strong></span>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Fragebereich mit Kami -->
        <div class="kami-frage-container">
            <!-- Deine winkende Mango Grafik als Avatar -->
            <img src="Kami_winkend_orange.png" alt="Kami" class="kami-avatar">
            <div class="speech-bubble">
                <p class="bubble-caption">Was bedeutet das Wort?</p>
                <h2 id="gesuchtes-wort">---</h2>
            </div>
        </div>

        <!-- Antworten -->
        <div class="antwort-box">
            <button class="antwort-btn">---</button>
            <button class="antwort-btn">---</button>
            <button class="antwort-btn">---</button>
            <button class="antwort-btn">---</button>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="feedback-box"></div>

        <!-- Weiter-Button -->
        <button id="weiter-btn" class="primary-btn">Nächste Frage ➡️</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
